<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Sayfa - Beden Otonomisi</title>

        body {

            background-color: #111;
            background-image: repeating-linear-gradient(45deg, #1a1a1a 25%, transparent 25%, transparent 75%, #1a1a1a 75%, #1a1a1a), repeating-linear-gradient(45deg, #1a1a1a 25%, #111 25%, #111 75%, #1a1a1a 75%, #1a1a1a);

            padding: 20px 0;
        }
        #wrapper {
            width: 960px;
            margin: 0 auto;
            background-color: #ccc;
            border: 4px solid #800; /* Koyu kırmızı dış çerçeve */
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #header {
            background: linear-gradient(to bottom, #600, #200);
            height: 150px;

            display: flex;

            justify-content: center;
            text-shadow: 2px 2px 4px #000;
        }
        #header h1 { margin: 0; font-size: 36px; letter-spacing: 2px; }
        #header p { margin: 5px 0 0 0; font-size: 14px; color: #ccc; }

        #main-container {
            display: flex;
            background-color: #ececec;
        }

        /* SOL MENÜ (tr.gg Stili) */
        #left-sidebar {
            width: 220px;
            background-color: #222;
            padding: 10px;
            border-right: 3px solid #800;
        }

            padding: 5px;
            font-size: 12px;
            border: 1px solid #555;
            margin-bottom: 10px;
            font-weight: bold;
            text-align: center;
        }
        .menu-item {
            display: block;
            background: linear-gradient(to bottom, #d00, #800);
            color: white;
            text-decoration: none;
            padding: 8px 10px;
            margin-bottom: 5px;
            border: 1px solid #000;
            font-size: 13px;
            font-weight: bold;
            text-shadow: 1px 1px 0px #000;
        }
        .menu-item:hover {
            background: linear-gradient(to bottom, #f00, #a00);
        }

        #content {
            flex: 1; /* Bu ayar sayesinde sağ sütun kalkınca yazı alanı otomatik genişler */
            padding: 20px;
            background-color: #fff;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }

            padding: 10px;
            border: 1px solid #ccc;
            font-weight: bold;
            color: #800;
            margin-bottom: 15px;
        }

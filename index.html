<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PİPİME DOKUNMA!</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: "Times New Roman", Times, serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .marquee-container {
            background-color: red;
            color: yellow;
            font-size: 24px;
            font-weight: bold;
            padding: 10px;
            border-bottom: 3px solid white;
        }
        .flag-container {
            margin-top: 50px;
        }
        .flag-container img {
            max-width: 600px;
            width: 90%;
            border: 5px solid yellow;
            transition: transform 0.2s;
        }
        .flag-container img:hover {
            transform: scale(1.05);
        }
        .blink {
            animation: blinker 1s linear infinite;
            color: red;
            font-size: 28px;
            font-weight: bold;
            margin-top: 40px;
            text-decoration: none;
            display: inline-block;
            text-shadow: 2px 2px 0px white;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
        .counter {
            margin-top: 60px;
            font-family: "Courier New", Courier, monospace;
            color: #00ff00;
            font-size: 22px;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <marquee scrollamount="12">DİKKAT! BU SİTE YÜKSEK DOZDA GERÇEKLİK VE BEDEN OTONOMİSİ İÇERİR.</marquee>
    </div>

    <div class="flag-container">
        <a href="manifesto.html">
            <img src="bayrak.jpg" alt="PİPİME DOKUNMA BAYRAĞI">
        </a>
    </div>

    <a href="manifesto.html" class="blink">[ GERÇEKLERLE YÜZLEŞMEK İÇİN BAYRAĞA TIKLA ]</a>

    <div class="counter">
        Şu ana kadar aydınlanan kişi sayısı:<br><br>
        <span style="border: 2px solid #00ff00; padding: 5px 10px; letter-spacing: 5px;">0 0 1 4 5 3</span>
    </div>

</body>
</html>

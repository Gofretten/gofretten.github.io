<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PİPİME DOKUNMA!</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: "Times New Roman", Times, serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .marquee-container {
            background-color: red;
            color: yellow;
            font-size: 24px;
            font-weight: bold;
            padding: 10px;
            border-bottom: 3px solid white;
        }
        .flag-container {
            margin-top: 50px;
        }
        .flag-container img {
            max-width: 600px;
            width: 90%;
            border: 5px solid yellow;
            transition: transform 0.2s;
        }
        .flag-container img:hover {
            transform: scale(1.05);
        }
        .blink {
            animation: blinker 1s linear infinite;
            color: red;
            font-size: 28px;
            font-weight: bold;
            margin-top: 40px;
            text-decoration: none;
            display: inline-block;
            text-shadow: 2px 2px 0px white;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
        .counter {
            margin-top: 60px;
            font-family: "Courier New", Courier, monospace;
            color: #00ff00;
            font-size: 22px;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <marquee scrollamount="12">DİKKAT! BU SİTE YÜKSEK DOZDA GERÇEKLİK VE BEDEN OTONOMİSİ İÇERİR.</marquee>
    </div>

    <div class="flag-container">
        <a href="manifesto.html">
            <img src="pipimedokunma.png" alt="PİPİME DOKUNMA BAYRAĞI">
        </a>
    </div>

    <a href="manifesto.html" class="blink">[ GERÇEKLERLE YÜZLEŞMEK İÇİN BAYRAĞA TIKLA ]</a>

   <div class="counter">
        Şu ana kadar aydınlanan kişi sayısı:<br><br>
        <span id="hit-counter" style="border: 2px solid #00ff00; padding: 5px 10px; letter-spacing: 5px;">145342</span>
    </div>

    <script>
        // İnternetin en büyük illüzyonu: Fake Canlı Sayaç
        // 2024'ten bu yana geçen dakikaları hesaplayıp baz sayıya ekler ki sayı hep mantıklı bir şekilde yüksek olsun
        let baseDate = new Date("2024-01-01").getTime();
        let now = new Date().getTime();
        let currentCount = 145300 + Math.floor((now - baseDate) / 30000); 

        let counterElement = document.getElementById('hit-counter');
        
        // İlk sayıyı ekrana yazdır ve 6 haneli yap (boşluklu)
        function updateDisplay() {
            let numStr = currentCount.toString().padStart(6, '0');
            counterElement.innerText = numStr.split('').join(' ');
        }
        updateDisplay();

        // Sayfada kaldıkça her 2-4 saniyede bir sayacı canlı canlı artır!
        setInterval(function() {
            currentCount += Math.floor(Math.random() * 3) + 1; // 1 ile 3 kişi arası ekle
            updateDisplay();
        }, Math.random() * 2000 + 2000); 
    </script>

</body>
</html>
